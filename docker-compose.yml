name: siem-backend

services:
  postgres:
    image: postgres:latest
    container_name: siem-postgres
    environment:
      POSTGRES_DB: siem_db
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U siem -d siem_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siem-network

  redis:
    image: redis:7-alpine
    container_name: siem-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siem-network

  elasticsearch:
    image: elasticsearch:9.4.2
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - siem-network

  kibana:
    image: kibana:9.4.3
    container_name: siem-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - siem-network

  frontend:
    image: cloudx02/siem-frontend:1.1.1
    container_name: siem-frontend
    environment:
      VITE_API_URL: http://localhost
      VITE_WS_URL: http://localhost
      VITE_USE_DEMO_DATA: "false"
    ports:
      - '5173:3001'
    depends_on:
      app:
        condition: service_started
    networks:
      - siem-network

  # ── Populates the shared frontend assets volume on startup ──
  frontend-assets:
    image: cloudx02/siem-frontend:1.1.1
    container_name: siem-frontend-assets
    user: root
    volumes:
      - frontend_assets:/output:rw
      - ./frontend-assets-init.sh:/init.sh:ro
    command: sh /init.sh
    networks:
      - siem-network

  caddy:
    image: caddy:2-alpine
    container_name: siem-caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - frontend_assets:/var/www/frontend:ro
    depends_on:
      frontend-assets:
        condition: service_completed_successfully
      app:
        condition: service_started
    networks:
      - siem-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://siem:siem_password@postgres:5432/siem_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: ctu-siem-jwt-secret-2026-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://localhost:3000,https://strife-cyber.taild0a5b5.ts.net,https://api.siem.strife-cyber.org
      SOAR_FIREWALL_PROVIDER: pfsense
      PFSENSE_URL: http://172.24.32.1:8080
      PFSENSE_API_KEY: 0ee670fbb746a2de16bae58c3775d088
      PFSENSE_TIMEOUT: '10000'
      PFSENSE_REJECT_UNAUTHORIZED: 'false'
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: '587'
      SMTP_USER: dunamisjunior15@gmail.com
      SMTP_PASS: fkjt myap dzjk hnhi
      SMTP_FROM_NAME: 'Smart SIEM CTU'
      ALERT_EMAIL_TO: dunamisjunior15@gmail.com
      SIEM_DASHBOARD_URL: https://strife-cyber.taild0a5b5.ts.net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - siem-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  caddy_data:
    driver: local
  frontend_assets:
    driver: local

networks:
  siem-network:
    driver: bridge
