name: siem-backend

services:
  postgres:
    image: postgres:latest
    container_name: siem-postgres
    environment:
      POSTGRES_DB: siem_db
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem_password
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U siem -d siem_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siem-network

  redis:
    image: redis:7-alpine
    container_name: siem-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siem-network

  elasticsearch:
    image: elasticsearch:9.4.2
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - siem-network

  kibana:
    image: kibana:9.4.3
    container_name: siem-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - siem-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siem-app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://siem:siem_password@postgres:5432/siem_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: change-this-to-a-secure-random-string-in-production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,https://api.siem.strife-cyber.org
      SOAR_FIREWALL_PROVIDER: pfsense
      PFSENSE_URL: http://192.168.37.135
      PFSENSE_API_KEY: 0ee670fbb746a2de16bae58c3775d088
      PFSENSE_TIMEOUT: '10000'
      PFSENSE_REJECT_UNAUTHORIZED: 'false'
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: '587'
      SMTP_USER: dunamisjunior15@gmail.com
      SMTP_PASS: fkjt myap dzjk hnhi
      SMTP_FROM_NAME: 'Smart SIEM CTU'
      ALERT_EMAIL_TO: dunamisjunior15@gmail.com
      SIEM_DASHBOARD_URL: https://api.siem.strife-cyber.org
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - siem-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  siem-network:
    driver: bridge
